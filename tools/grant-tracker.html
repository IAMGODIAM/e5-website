<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>E5 Enclave — Sovereign Grant Tracker</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--bg:#070710;--surface:#0d0d1a;--card:#111128;--border:#c9a84c22;--border-a:#c9a84c66;--gold:#c9a84c;--cream:#e8d5a3;--green:#4cc98a;--red:#f72585;--blue:#4cc9f0;--dim:#ffffff22;--text:#e8e8f0;--text2:#8888aa;--text3:#555577}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}
.hd{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--cream));border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--bg);font-family:'JetBrains Mono',monospace}
.hd-title{font-size:16px;font-weight:600;color:var(--cream)}
.hd-sub{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.hd-r{display:flex;align-items:center;gap:10px}
.btn{background:var(--card);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn-p{background:linear-gradient(135deg,var(--gold),var(--cream));color:var(--bg);border:none;font-weight:600}
.btn-p:hover{opacity:.9}
.btn-sm{padding:4px 10px;font-size:11px}
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;padding:16px 24px;max-width:1400px;margin:0 auto}
.stat{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.stat-v{font-size:20px;font-weight:700;color:(--cream)}
.stat-v.g{color:var(--green)}.stat-v.r{color:var(--red)}.stat-v.b{color:var(--blue)}.stat-v.y{color:var(--gold)}
.main{padding:0 24px 24px;max-width:1400px;margin:0 auto}
.view-tabs{display:flex;gap:4px;margin-bottom:16px}
.vt{padding:8px 16px;font-size:12px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;font-family:'JetBrains Mono',monospace}
.vt.active{color:var(--gold);border-bottom-color:var(--gold)}
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;align-items:start}
.col{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;min-height:300px}
.col-hd{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.col-title{font-size:11px;font-weight:600;color:var(--cream);font-family:'JetBrains Mono',monospace}
.col-cnt{font-size:10px;color:var(--text3);background:var(--surface);padding:1px 7px;border-radius:8px;font-family:'JetBrains Mono',monospace}
.col-body{padding:8px;display:flex;flex-direction:column;gap:6px;min-height:40px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .15s}
.card:hover{border-color:var(--border-a)}
.card-title{font-size:12px;font-weight:500;margin-bottom:4px;line-height:1.3;color:var(--text)}
.card-amount{font-size:14px;font-weight:700;color:var(--gold);margin:4px 0}
.card-deadline{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.card-deadline.urgent{color:var(--red)}
.card-tags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.card-tag{font-size:8px;padding:1px 5px;border-radius:3px;background:var(--dim);color:var(--text2)}
.card-status{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600}
.cs-submitted{background:var(--blue);color:#fff}.cs-approved{background:var(--green);color:var(--bg)}.cs-rejected{background:var(--red);color:#fff}.cs-draft{background:var(--text3);color:var(--text)}
.timeline{position:relative;padding-left:24px}
.timeline::before{content:"";position:absolute;left:7px;top:0;bottom:0;width:2px;background:var(--border)}
.tl-item{position:relative;padding-bottom:16px}
.tl-dot{position:absolute;left:-21px;top:4px;width:12px;height:12px;border-radius:50%;border:2px solid var(--gold);background:var(--bg)}
.tl-date{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-bottom:2px}
.tl-title{font-size:12px;font-weight:500}
.modal-overlay{position:fixed;inset:0;background:#00000080;display:none;align-items:center;justify-content:center;z-index:200}
.modal-overlay.show{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:14px;width:520px;max-height:80vh;overflow-y:auto}
.modal-hd{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:600;color:var(--cream)}
.modal-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer}
.modal-body{padding:16px 20px}
.modal-ft{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'JetBrains Mono',monospace}
.fi,.fta,.fs{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:12px}
.fi:focus,.fta:focus,.fs:focus{outline:none;border-color:var(--gold)}
.fta{min-height:60px;resize:vertical}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 16px;border-radius:6px;font-size:11px;z-index:300;transition:all .3s;transform:translateY(80px);opacity:0}
.toast.show{transform:translateY(0);opacity:1}
.toast-ok{background:var(--green);color:var(--bg)}.toast-err{background:var(--red);color:#fff}
.hidden{display:none!important}
@media(max-width:900px){.kanban{grid-template-columns:repeat(3,1fr)}.stats{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.kanban{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.fr{grid-template-columns:1fr}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:3px}
</style>
</head>
<body>
<div class="hd">
  <div class="hd-l"><div class="logo">G</div><div><div class="hd-title">Sovereign Grant Tracker</div><div class="hd-sub">E5 Enclave · Replace Salesforce · v1.0</div></div></div>
  <div class="hd-r"><button class="btn btn-p" onclick="openNewGrant()">+ NEW GRANT</button></div>
</div>
<div class="stats">
  <div class="stat"><div class="stat-l">TOTAL PIPELINE</div><div class="stat-v y" id="sPipeline">$0</div></div>
  <div class="stat"><div class="stat-l">ACTIVE</div><div class="stat-v b" id="sActive">0</div></div>
  <div class="stat"><div class="stat-l">SUBMITTED</div><div class="stat-v" id="sSubmitted">0</div></div>
  <div class="stat"><div class="stat-l">AWARDED</div><div class="stat-v g" id="sAwarded">0</div></div>
  <div class="stat"><div class="stat-l">SUCCESS RATE</div><div class="stat-v" id="sRate">—</div></div>
  <div class="stat"><div class="stat-l">DAYS TO NEXT</div><div class="stat-v r" id="sNext">—</div></div>
</div>
<div class="main">
  <div class="view-tabs">
    <div class="vt active" onclick="showView('kanban')">◉ KANBAN</div>
    <div class="vt" onclick="showView('timeline')">◈ TIMELINE</div>
    <div class="vt" onclick="showView('analytics')">◊ ANALYTICS</div>
  </div>
  <div id="view-kanban">
    <div class="kanban">
      <div class="col"><div class="col-hd"><div class="col-title">◉ RESEARCH</div><span class="col-cnt" id="cnt-research">0</span></div><div class="col-body" id="col-research"></div></div>
      <div class="col"><div class="col-hd"><div class="col-title">◉ DRAFTING</div><span class="col-cnt" id="cnt-drafting">0</span></div><div class="col-body" id="col-drafting"></div></div>
      <div class="col"><div class="col-hd"><div class="col-title">◉ REVIEW</div><span class="col-cnt" id="cnt-review">0</span></div><div class="col-body" id="col-review"></div></div>
      <div class="col"><div class="col-hd"><div class="col-title">◉ SUBMITTED</div><span class="col-cnt" id="cnt-submitted">0</span></div><div class="col-body" id="col-submitted"></div></div>
      <div class="col"><div class="col-hd"><div class="col-title">◉ DECIDED</div><span class="col-cnt" id="cnt-decided">0</span></div><div class="col-body" id="col-decided"></div></div>
    </div>
  </div>
  <div id="view-timeline" class="hidden">
    <div class="timeline" id="timelineView"></div>
  </div>
  <div id="view-analytics" class="hidden">
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px">
      <div class="stat"><div class="stat-l">BY FUNDER TYPE</div><div id="byType" style="margin-top:8px"></div></div>
      <div class="stat"><div class="stat-l">BY QUARTER</div><div id="byQuarter" style="margin-top:8px"></div></div>
      <div class="stat"><div class="stat-l">WYRMCORE SCORE</div><div id="grantScore" style="margin-top:8px"></div></div>
    </div>
  </div>
</div>
<div class="modal-overlay" id="modal-grant">
  <div class="modal">
    <div class="modal-hd"><div class="modal-title" id="modalTitle">+ New Grant</div><button class="modal-close" onclick="closeModal('modal-grant')">✕</button></div>
    <div class="modal-body">
      <div class="fg"><label class="fl">Funder Name</label><input class="fi" id="gFunder" placeholder="e.g. Headwaters Foundation"></div>
      <div class="fr">
        <div class="fg"><label class="fl">Amount ($)</label><input class="fi" id="gAmount" type="number" placeholder="15000"></div>
        <div class="fg"><label class="fl">Deadline</label><input class="fi" id="gDeadline" type="date"></div>
      </div>
      <div class="fr">
        <div class="fg"><label class="fl">Status</label><select class="fs" id="gStatus"><option value="research">Research</option><option value="drafting">Drafting</option><option value="review">Review</option><option value="submitted">Submitted</option><option value="decided">Decided</option></select></div>
        <div class="fg"><label class="fl">Priority</label><select class="fs" id="gPriority"><option value="0">P0 — Urgent (&lt;7 days)</option><option value="1" selected>P1 — High (&lt;30 days)</option><option value="2">P2 — Normal</option><option value="3">P3 — Low</option></select></div>
      </div>
      <div class="fg"><label class="fl">Description / Notes</label><textarea class="fta" id="gNotes" placeholder="Grant purpose, requirements, strategy notes..."></textarea></div>
      <div class="fg"><label class="fl">Tags</label><input class="fi" id="gTags" placeholder="STEM, HBCU, health, education"></div>
      <div class="fg"><label class="fl">Funder Type</label><select class="fs" id="gType"><option value="foundation">Private Foundation</option><option value="government">Government</option><option value="corporate">Corporate</option><option value="individual">Individual Donor</option></select></div>
    </div>
    <div class="modal-ft"><button class="btn" onclick="closeModal('modal-grant')">Cancel</button><button class="btn btn-p" onclick="saveGrant()">Save</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let grants=JSON.parse(localStorage.getItem('e5_grants')||'[]');
let editingId=null;
if(!grants.length){
  grants=[
    {id:'g-001',funder:'Headwaters Justice & Liberation Fund',amount:15000,deadline:'2026-05-20',status:'drafting',priority:0,notes:'LOI due May 20. $15K for general operating support.',tags:['urgent','general-operating'],type:'foundation',created:Date.now()-172800000},
    {id:'g-002',funder:'NSF STEM/HBCU Program',amount:500000,deadline:'2026-06-01',status:'research',priority:1,notes:'NSF 26-501. HBCU STEM curriculum development using agentic platform.',tags:['STEM','HBCU','major'],type:'government',created:Date.now()-86400000},
    {id:'g-003',funder:'Broward County Gap Financing',amount:22000000,deadline:'2026-06-15',status:'research',priority:1,notes:'Affordable housing gap financing. $22M. Need partnership with local CDFI.',tags:['housing','major','partnership'],type:'government',created:Date.now()-43200000},
    {id:'g-004',funder:'Ford Foundation',amount:250000,deadline:'2026-07-01',status:'research',priority:2,notes:'BDI Black Paper dissemination. Technology for racial justice.',tags:['racial-justice','tech'],type:'foundation',created:Date.now()},
    {id:'g-005',funder:'Knight Foundation',amount:100000,deadline:'2026-08-15',status:'research',priority:2,notes:'Local news and information ecosystem. Agentic content engine.',tags:['media','local'],type:'foundation',created:Date.now()},
    {id:'g-006',funder:'MacArthur Foundation',amount:1000000,deadline:'2026-09-01',status:'research',priority:2,notes:'100&Change competition. $1M for BDI platform scaling.',tags:['major','scaling'],type:'foundation',created:Date.now()},
  ];
}
function save(){localStorage.setItem('e5_grants',JSON.stringify(grants));renderAll()}
function gid(){return 'g-'+Math.random().toString(36).slice(2,7)}
function renderAll(){renderKanban();renderStats();renderTimeline();renderAnalytics()}
function renderKanban(){
  ['research','drafting','review','submitted','decided'].forEach(s=>{
    const col=document.getElementById('col-'+s);
    const f=grants.filter(g=>g.status===s);
    document.getElementById('cnt-'+s).textContent=f.length;
    col.innerHTML=f.map(g=>{
      const days=g.deadline?Math.ceil((new Date(g.deadline)-Date.now())/86400000):999;
      const urgent=days<=7?'urgent':'';
      const pri=['P0','P1','P2','P3'][g.priority]||'P2';
      return `<div class="card" onclick="editGrant('${g.id}')">
        <div class="card-title">${g.funder}</div>
        <div class="card-amount">${g.amount.toLocaleString('en-US',{style:'currency',currency:'USD',maximumFractionDigits:0})}</div>
        <div class="card-deadline ${urgent}">⏰ ${g.deadline||'No deadline'} (${days}d)</div>
        ${(g.tags||[]).length?`<div class="card-tags">${(g.tags||[]).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>`:''}
        ${g.status==='decided'?`<span class="card-status ${g.awarded?'cs-approved':'cs-rejected'}">${g.awarded?'AWARDED':'REJECTED'}</span>`:''}
      </div>`;
    }).join('')||'<div style="color:var(--text3);font-size:10px;text-align:center;padding:8px 0">Empty</div>';
  });
}
function renderStats(){
  const total=grants.reduce((s,g)=>s+(g.amount||0),0);
  document.getElementById('sPipeline').textContent='$'+total.toLocaleString();
  document.getElementById('sActive').textContent=grants.filter(g=>g.status!=='decided').length;
  document.getElementById('sSubmitted').textContent=grants.filter(g=>g.status==='submitted'||g.status==='decided').length;
  const awarded=grants.filter(g=>g.status==='decided'&&g.awarded);
  document.getElementById('sAwarded').textContent='$'+awarded.reduce((s,g)=>s+g.amount,0).toLocaleString();
  const decided=grants.filter(g=>g.status==='decided');
  document.getElementById('sRate').textContent=decided.length?((awarded.length/decided.length)*100).toFixed(0)+'%':'—';
  const upcoming=grants.filter(g=>g.status!=='decided'&&g.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  if(upcoming.length){const d=Math.ceil((new Date(upcoming[0].deadline)-Date.now())/86400000);document.getElementById('sNext').textContent=d+'d';}
}
function renderTimeline(){
  const sorted=[...grants].filter(g=>g.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline));
  document.getElementById('timelineView').innerHTML=sorted.map(g=>{
    const days=Math.ceil((new Date(g.deadline)-Date.now())/86400000);
    const color=days<=7?'var(--red)':days<=30?'var(--gold)':'var(--green)';
    return `<div class="tl-item"><div class="tl-dot" style="border-color:${color}"></div><div class="tl-date">${g.deadline} (${days}d)</div><div class="tl-title">${g.funder} — $${g.amount.toLocaleString()}</div></div>`;
  }).join('')||'<div style="color:var(--text3);font-size:12px;padding:20px 0">No deadlines set</div>';
}
function renderAnalytics(){
  const types={};
  grants.forEach(g=>{const t=g.type||'unknown';types[t]=(types[t]||0)+g.amount;});
  document.getElementById('byType').innerHTML=Object.entries(types).map(([t,a])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px"><span style="color:var(--text2)">${t}</span><span style="color:var(--gold)">$${a.toLocaleString()}</span></div>`).join('');
  const q={};
  grants.forEach(g=>{if(g.deadline){const m=new Date(g.deadline);const k='Q'+Math.ceil((m.getMonth()+1)/3)+' '+m.getFullYear();q[k]=(q[k]||0)+g.amount;}});
  document.getElementById('byQuarter').innerHTML=Object.entries(q).sort().map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px"><span style="color:var(--text2)">${k}</span><span style="color:var(--gold)">$${v.toLocaleString()}</span></div>`).join('');
  // Wyrmcore grant score
  const total=grants.length;
  const urgent=grants.filter(g=>{const d=g.deadline?Math.ceil((new Date(g.deadline)-Date.now())/86400000):999;return d<=14;}).length;
  const diversity=new Set(grants.map(g=>g.type)).size/4;
  const coverage=grants.filter(g=>g.status!=='research').length/(total||1);
  const score=Math.min(100,(diversity*30+coverage*40+(1-urgent/(total||1))*30));
  document.getElementById('grantScore').innerHTML=`<div style="font-size:28px;font-weight:700;color:var(--gold)">${score.toFixed(0)}</div><div style="font-size:10px;color:var(--text3);margin-top:4px">Diversity: ${(diversity*100).toFixed(0)}% · Coverage: ${(coverage*100).toFixed(0)}% · Urgent: ${urgent}</div>`;
}
function showView(v){document.querySelectorAll('.vt').forEach(t=>t.classList.remove('active'));event.target.classList.add('active');document.getElementById('view-kanban').classList.toggle('hidden',v!=='kanban');document.getElementById('view-timeline').classList.toggle('hidden',v!=='timeline');document.getElementById('view-analytics').classList.toggle('hidden',v!=='analytics');}
function openNewGrant(){editingId=null;document.getElementById('modalTitle').textContent='+ New Grant';document.getElementById('gFunder').value='';document.getElementById('gAmount').value='';document.getElementById('gDeadline').value='';document.getElementById('gNotes').value='';document.getElementById('gTags').value='';document.getElementById('modal-grant').classList.add('show');}
function editGrant(id){const g=grants.find(x=>x.id===id);if(!g)return;editingId=id;document.getElementById('modalTitle').textContent='Edit: '+g.funder;document.getElementById('gFunder').value=g.funder;document.getElementById('gAmount').value=g.amount;document.getElementById('gDeadline').value=g.deadline||'';document.getElementById('gStatus').value=g.status;document.getElementById('gPriority').value=g.priority||2;document.getElementById('gNotes').value=g.notes||'';document.getElementById('gTags').value=(g.tags||[]).join(', ');document.getElementById('gType').value=g.type||'foundation';document.getElementById('modal-grant').classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function saveGrant(){
  const g={id:editingId||gid(),funder:document.getElementById('gFunder').value,amount:parseInt(document.getElementById('gAmount').value)||0,deadline:document.getElementById('gDeadline').value,status:document.getElementById('gStatus').value,priority:parseInt(document.getElementById('gPriority').value)||2,notes:document.getElementById('gNotes').value,tags:(document.getElementById('gTags').value||'').split(',').map(s=>s.trim()).filter(Boolean),type:document.getElementById('gType').value,created:Date.now()};
  if(!g.funder)return showToast('Funder name required','err');
  if(editingId){const i=grants.findIndex(x=>x.id===editingId);if(i>=0)grants[i]={...grants[i],...g};}else grants.push(g);
  save();closeModal('modal-grant');showToast(editingId?'Updated':'Created','ok');
}
function showToast(msg,type){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show toast-'+type;setTimeout(()=>el.classList.remove('show'),3000);}
renderAll();
</script>
</body>
</html>
