<style>
/* ——— REPARATIONS | RESTORATION — EDITORIAL STYLES ——— */

:root {
  --ink: #0b0b0c;
  --ink-soft: #1a1a1c;
  --cream: #f3efe6;
  --cream-deep: #e8e1d2;
  --paper: #faf6ec;
  --oxblood: #5c1a1b;
  --oxblood-deep: #3d1011;
  --champagne: #7e6329;
  --gold: #7e6329;
  --rule: rgba(11,11,12,0.18);
  --rule-dark: rgba(11,11,12,0.14);
  --serif-display: "Bodoni Moda", "Didot", "Times New Roman", serif;
  --serif-text: "Cormorant Garamond", "Garamond", serif;
  --sans: "Inter Tight", ui-sans-serif, sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--cream);
  color: var(--ink);
  font-family: var(--serif-text);
  font-weight: 400;
  font-size: 19px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}
img, svg { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }

/* ——— MICRO ——— */
.micro { font-family: var(--sans); font-size: 10.5px; font-weight: 500; letter-spacing: 0.22em; text-transform: uppercase; }
.micro-lg { font-size: 12px; letter-spacing: 0.28em; }
.caption { font-family: var(--sans); font-size: 11px; font-weight: 400; letter-spacing: 0.08em; color: rgba(11,11,12,0.55); }
.dark .caption { color: rgba(11,11,12,0.55); }

/* ——— TOPBAR ——— */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 60;
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 40px;
  background: linear-gradient(to bottom, rgba(250,246,236,0.9), rgba(250,246,236,0));
  color: var(--ink);
  pointer-events: none;
  transition: background 0.4s, color 0.4s;
}
.topbar.light {
  background: linear-gradient(to bottom, rgba(250,246,236,0.9), rgba(250,246,236,0));
  color: var(--ink);
}
.topbar .mark { font-family: var(--serif-display); font-size: 14px; letter-spacing: 0.04em; font-weight: 500; }
.topbar .mark em { font-style: italic; font-weight: 400; opacity: 0.75; }
.topbar .folio { font-family: var(--sans); font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; opacity: 0.8; }

/* ——— COVER ——— */
.cover {
  position: relative;
  min-height: 100vh;
  background: linear-gradient(180deg, var(--paper) 0%, var(--cream-deep) 100%);
  color: var(--ink);
  overflow: hidden;
}
.cover::before {
  content: "";
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(126,99,41,0.14), transparent 55%),
    radial-gradient(ellipse at 85% 80%, rgba(92,26,27,0.10), transparent 60%),
    repeating-linear-gradient(90deg, transparent 0 79px, rgba(11,11,12,0.022) 79px 80px);
  pointer-events: none;
}
.cover::after {
  content: "";
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 50% 120%, rgba(126,99,41,0.06), transparent 50%);
  pointer-events: none;
}
.cover-inner {
  position: relative; z-index: 2;
  display: grid; grid-template-rows: 1fr auto;
  align-content: space-between;
  min-height: 100vh;
  padding: 120px 64px 56px;
}
.cover-folio {
  position: absolute; top: 84px; left: 64px; right: 64px;
  display: flex; justify-content: space-between; z-index: 3;
}
.cover-folio .l { color: var(--champagne); opacity: 0.9; }
.cover-folio .r { color: rgba(11,11,12,0.65); }
.cover-plate { text-align: center; align-self: center; margin: auto 0; padding: 40px 0; }
.cover-eyebrow {
  font-family: var(--sans); font-size: 11px; letter-spacing: 0.5em; text-transform: uppercase;
  color: var(--champagne);
  margin-bottom: 40px;
  display: inline-flex; align-items: center; gap: 18px;
}
.cover-eyebrow::before, .cover-eyebrow::after {
  content: ""; width: 48px; height: 1px; background: var(--champagne); opacity: 0.85;
}
.cover-title {
  font-family: var(--serif-display);
  font-weight: 500;
  font-size: clamp(64px, 11vw, 168px);
  line-height: 0.92;
  letter-spacing: -0.02em;
  font-optical-sizing: auto;
}
.cover-title .bar { display: inline-block; color: var(--champagne); font-weight: 300; margin: 0 0.12em; transform: translateY(-0.08em); }
.cover-title .restoration { font-style: italic; font-weight: 400; }
.cover-sub {
  margin-top: 36px;
  font-family: var(--serif-text); font-style: italic; font-weight: 300;
  font-size: clamp(18px, 1.6vw, 24px);
  letter-spacing: 0.02em;
  color: rgba(11,11,12,0.8);
}
.cover-foot {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  align-items: end;
  gap: 24px;
  padding-top: 40px;
  border-top: 1px solid var(--rule-dark);
}
.cover-foot .col { font-family: var(--sans); font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(11,11,12,0.7); }
.cover-foot .col.mid { text-align: center; color: var(--champagne); letter-spacing: 0.35em; }
.cover-foot .col.right { text-align: right; }
.cover-foot .col strong { display: block; color: var(--ink); font-weight: 500; margin-bottom: 4px; letter-spacing: 0.18em; }

.scroll-hint {
  position: absolute; left: 50%; bottom: 56px;
  transform: translateX(-50%);
  font-family: var(--sans); font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase;
  color: rgba(11,11,12,0.6);
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  z-index: 3;
}
.scroll-hint .line {
  width: 1px; height: 48px;
  background: linear-gradient(to bottom, var(--champagne), transparent);
  animation: drip 2.8s ease-in-out infinite;
  transform-origin: top;
}
@keyframes drip {
  0%,100% { transform: scaleY(0.3); opacity: 0.3; }
  50% { transform: scaleY(1); opacity: 1; }
}

/* ——— SECTION SCAFFOLD ——— */
section { position: relative; }
.plate { padding: 140px 80px; max-width: 1440px; margin: 0 auto; }
.dark { background: var(--cream-deep); color: var(--ink); }
.deep { background: var(--cream-deep); color: var(--ink); }

/* chapter header */
.chapter-head {
  display: grid; grid-template-columns: 200px 1fr;
  gap: 80px; align-items: start;
  padding-bottom: 64px;
  border-bottom: 1px solid var(--rule);
  margin-bottom: 80px;
}
.dark .chapter-head, .deep .chapter-head { border-color: var(--rule-dark); }
.chapter-num {
  font-family: var(--serif-display); font-style: italic; font-weight: 400;
  font-size: 148px; line-height: 0.85;
  color: var(--oxblood);
  letter-spacing: -0.04em;
}
.dark .chapter-num, .deep .chapter-num { color: var(--champagne); }
.chapter-num::after {
  content: ""; display: block; width: 64px; height: 1px; background: currentColor;
  margin-top: 24px; opacity: 0.5;
}
.chapter-kicker {
  font-family: var(--sans); font-size: 11px; letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--oxblood); margin-bottom: 22px;
}
.dark .chapter-kicker, .deep .chapter-kicker { color: var(--champagne); }
.chapter-title {
  font-family: var(--serif-display); font-weight: 500;
  font-size: clamp(40px, 5.2vw, 72px);
  line-height: 1.02; letter-spacing: -0.015em;
  max-width: 20ch;
}
.chapter-answer {
  margin-top: 40px;
  display: inline-flex; align-items: baseline; gap: 22px;
  padding-top: 22px;
  border-top: 1px solid var(--rule);
}
.dark .chapter-answer, .deep .chapter-answer { border-color: var(--rule-dark); }
.chapter-answer .lbl { font-family: var(--sans); font-size: 10px; letter-spacing: 0.32em; text-transform: uppercase; color: rgba(11,11,12,0.55); }
.dark .chapter-answer .lbl, .deep .chapter-answer .lbl { color: rgba(11,11,12,0.55); }
.chapter-answer .val {
  font-family: var(--serif-display); font-style: italic; font-weight: 500;
  font-size: 40px; letter-spacing: -0.01em;
  color: var(--oxblood);
}
.dark .chapter-answer .val, .deep .chapter-answer .val { color: var(--champagne); }

/* body columns */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
.body-prose p {
  font-family: var(--serif-text);
  font-size: 20px; line-height: 1.55;
  margin-bottom: 1.1em;
  max-width: 36em;
}
.body-prose p.lead { font-size: 24px; line-height: 1.42; }
.body-prose p.lead .dropcap {
  float: left;
  font-family: var(--serif-display); font-weight: 500;
  font-size: 86px; line-height: 0.85;
  padding: 6px 14px 0 0;
  color: var(--oxblood);
}
.dark .body-prose p.lead .dropcap, .deep .body-prose p.lead .dropcap { color: var(--champagne); }
.body-prose .accent { color: var(--oxblood); font-weight: 500; }
.dark .body-prose .accent, .deep .body-prose .accent { color: var(--champagne); font-weight: 500; }

.pull-quote {
  font-family: var(--serif-display);
  font-style: italic; font-weight: 400;
  font-size: clamp(28px, 3vw, 42px);
  line-height: 1.2; letter-spacing: -0.005em;
  padding: 24px 0 24px 32px;
  border-left: 2px solid var(--oxblood);
  max-width: 22ch;
}
.dark .pull-quote, .deep .pull-quote { border-left-color: var(--champagne); color: var(--ink); }

/* ——— PREMISE ——— */
.premise { background: var(--paper); }
.premise-grid {
  display: grid; grid-template-columns: 1fr 1.3fr;
  gap: 120px; align-items: start;
}
.premise-kicker {
  font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.35em; text-transform: uppercase;
  color: var(--oxblood); margin-bottom: 28px;
  display: flex; align-items: center; gap: 16px;
}
.premise-kicker::before { content: ""; width: 28px; height: 1px; background: var(--oxblood); }
.premise-title {
  font-family: var(--serif-display); font-weight: 500;
  font-size: clamp(34px, 3.8vw, 56px);
  line-height: 1.05; letter-spacing: -0.01em;
  margin-bottom: 36px;
}
.premise-title em { font-style: italic; font-weight: 400; color: var(--oxblood); }
.premise-note {
  padding: 40px;
  background: var(--cream);
  border: 1px solid var(--rule);
  border-left: 3px solid var(--oxblood);
  margin-top: 48px;
}
.premise-note .micro { color: var(--oxblood); margin-bottom: 14px; display: block; }
.premise-note p { font-size: 18px; line-height: 1.5; }
.premise-note p + p { margin-top: 12px; }

/* ——— LEDGER ——— */
.ledger { margin-top: 40px; border-top: 2px solid var(--ink); }
.ledger-head {
  display: grid; grid-template-columns: 80px 1.1fr 2fr;
  padding: 16px 0; gap: 40px;
  border-bottom: 1px solid var(--rule);
  font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(11,11,12,0.6);
}
.ledger-row {
  display: grid; grid-template-columns: 80px 1.1fr 2fr;
  padding: 32px 0; gap: 40px;
  border-bottom: 1px solid var(--rule);
  align-items: baseline;
}
.ledger-row .idx { font-family: var(--serif-display); font-style: italic; font-weight: 400; font-size: 28px; color: var(--oxblood); }
.ledger-row .name { font-family: var(--serif-display); font-size: 26px; font-weight: 500; letter-spacing: -0.005em; line-height: 1.15; }
.ledger-row .desc { font-family: var(--serif-text); font-size: 18px; line-height: 1.5; color: rgba(11,11,12,0.78); max-width: 48em; }
.ledger-foot {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 36px 0 0;
  border-top: 2px solid var(--ink);
  margin-top: 8px;
}
.ledger-foot .label { font-family: var(--serif-display); font-style: italic; font-weight: 500; font-size: 32px; }
.ledger-foot .value { font-family: var(--serif-display); font-weight: 500; font-size: 32px; color: var(--oxblood); letter-spacing: -0.01em; }

/* ——— NUMBER / CERTIFICATE ——— */
.q4 { background: var(--cream-deep); color: var(--ink); overflow: hidden; }
.q4::before {
  content: ""; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 50% 0%, rgba(126,99,41,0.10), transparent 55%),
    radial-gradient(ellipse at 50% 120%, rgba(92,26,27,0.08), transparent 60%);
  pointer-events: none;
}
.q4 .plate { position: relative; z-index: 2; }
.number-cert {
  text-align: center;
  padding: 80px 40px;
  border-top: 1px solid var(--champagne);
  border-bottom: 1px solid var(--champagne);
  position: relative;
  margin: 40px 0 80px;
}
.number-cert::before, .number-cert::after {
  content: ""; position: absolute; width: 24px; height: 24px; border: 1px solid var(--champagne);
}
.number-cert::before { top: -12px; left: -12px; border-right: 0; border-bottom: 0; }
.number-cert::after { bottom: -12px; right: -12px; border-left: 0; border-top: 0; }
.number-seal {
  font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.5em; text-transform: uppercase;
  color: var(--champagne); margin-bottom: 28px;
}
.number-big {
  font-family: var(--serif-display); font-weight: 500;
  font-size: clamp(100px, 18vw, 280px);
  line-height: 0.9; letter-spacing: -0.04em;
  color: var(--ink);
}
.number-big .sign { font-weight: 300; color: var(--champagne); font-size: 0.6em; vertical-align: 0.3em; margin-right: 0.08em; }
.number-big .unit { font-style: italic; font-weight: 400; font-size: 0.56em; color: var(--champagne); margin-left: 0.1em; letter-spacing: -0.02em; }
.number-sub {
  margin-top: 36px;
  font-family: var(--serif-display); font-style: italic; font-weight: 400;
  font-size: clamp(20px, 1.8vw, 26px);
  color: rgba(11,11,12,0.88);
}
.number-foot-rule {
  margin-top: 28px;
  font-family: var(--sans); font-size: 10.5px; letter-spacing: 0.4em; text-transform: uppercase;
  color: rgba(11,11,12,0.55);
}

/* mechanism triptych */
.mechanism {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 1px; background: var(--champagne);
  margin-top: 40px; border: 1px solid var(--champagne);
}
.mechanism .cell {
  background: var(--cream);
  padding: 44px 36px; min-height: 320px;
  display: flex; flex-direction: column; justify-content: space-between;
}
.mechanism .cell .top { display: flex; justify-content: space-between; align-items: baseline; }
.mechanism .cell .num { font-family: var(--serif-display); font-style: italic; font-weight: 400; font-size: 46px; color: var(--champagne); line-height: 1; }
.mechanism .cell .tag { font-family: var(--sans); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(11,11,12,0.6); }
.mechanism .cell h3 { margin: 40px 0 18px; font-family: var(--serif-display); font-weight: 500; font-size: 26px; line-height: 1.15; letter-spacing: -0.005em; }
.mechanism .cell p { font-size: 16px; line-height: 1.5; color: rgba(11,11,12,0.82); max-width: 30em; }

/* yield */
.yield-row {
  margin-top: 80px;
  display: grid; grid-template-columns: 1fr auto 1fr;
  gap: 48px; align-items: center;
  padding: 48px 0;
  border-top: 1px solid var(--rule-dark);
  border-bottom: 1px solid var(--rule-dark);
}
.yield-row .lhs, .yield-row .rhs {
  font-family: var(--serif-text); font-size: 18px; line-height: 1.5;
  color: rgba(11,11,12,0.85); max-width: 28em;
}
.yield-row .rhs { text-align: right; justify-self: end; }
.yield-center { text-align: center; }
.yield-center .pct {
  font-family: var(--serif-display); font-weight: 500;
  font-size: 88px; line-height: 1; letter-spacing: -0.02em; color: var(--champagne);
}
.yield-center .pct em { font-style: italic; font-weight: 400; }
.yield-center .lbl { font-family: var(--sans); font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: rgba(11,11,12,0.65); margin-top: 10px; }

/* ——— BUREAU ——— */
.bureau { background: var(--cream-deep); color: var(--ink); }
.bureau-hero { display: grid; grid-template-columns: 1.1fr 1fr; gap: 100px; align-items: center; }
.bureau-seal { max-width: 440px; justify-self: end; aspect-ratio: 1/1; }
.bureau-title { font-family: var(--serif-display); font-weight: 500; font-size: clamp(44px, 5vw, 76px); line-height: 1; letter-spacing: -0.015em; }
.bureau-title em { font-style: italic; font-weight: 400; color: var(--champagne); }
.bureau-sub { margin-top: 22px; font-family: var(--serif-text); font-style: italic; font-size: 22px; color: rgba(11,11,12,0.8); max-width: 30em; }
.bureau-body { margin-top: 28px; font-family: var(--serif-text); font-size: 19px; line-height: 1.55; color: rgba(11,11,12,0.78); max-width: 34em; }

.mandates { margin-top: 100px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; border-top: 1px solid var(--rule-dark); }
.mandate { display: grid; grid-template-columns: 80px 1fr; gap: 32px; padding: 40px 48px 40px 0; border-bottom: 1px solid var(--rule-dark); }
.mandate:nth-child(odd) { padding-right: 64px; border-right: 1px solid var(--rule-dark); }
.mandate:nth-child(even) { padding-left: 48px; }
.mandate .num { font-family: var(--serif-display); font-style: italic; font-weight: 400; font-size: 38px; color: var(--champagne); line-height: 1; }
.mandate h3 { font-family: var(--serif-display); font-weight: 500; font-size: 23px; margin-bottom: 10px; letter-spacing: -0.005em; }
.mandate p { font-family: var(--serif-text); font-size: 17px; line-height: 1.5; color: rgba(11,11,12,0.78); }

/* ——— Q5 ——— */
.q5 { background: var(--paper); }
.elig-grid { display: grid; grid-template-columns: 1.1fr 1fr; gap: 100px; }
.elig-criteria { border-top: 1px solid var(--ink); margin-top: 20px; }
.elig-criteria .row { display: grid; grid-template-columns: 60px 1fr; padding: 28px 0; border-bottom: 1px solid var(--rule); align-items: start; }
.elig-criteria .row .mk { font-family: var(--serif-display); font-style: italic; font-weight: 400; font-size: 26px; color: var(--oxblood); line-height: 1; }
.elig-criteria .row .txt { font-family: var(--serif-text); font-size: 21px; line-height: 1.4; }
.elig-criteria .row .txt strong { font-weight: 500; color: var(--oxblood); }

/* ——— SUMMARY ——— */
.summary { background: var(--cream); }
.summary-title { font-family: var(--serif-display); font-weight: 500; font-size: clamp(40px, 4.5vw, 64px); line-height: 1.04; letter-spacing: -0.01em; margin-bottom: 56px; max-width: 20ch; }
.summary-title em { font-style: italic; color: var(--oxblood); font-weight: 400; }
.summary-table { border-top: 2px solid var(--ink); }
.summary-row { display: grid; grid-template-columns: 80px 1.4fr 1fr; gap: 40px; padding: 36px 0; border-bottom: 1px solid var(--rule); align-items: baseline; }
.summary-row .qnum { font-family: var(--serif-display); font-style: italic; font-weight: 500; font-size: 40px; color: var(--oxblood); line-height: 1; }
.summary-row .q { font-family: var(--serif-display); font-size: 22px; font-weight: 500; letter-spacing: -0.005em; line-height: 1.2; }
.summary-row .a { font-family: var(--serif-text); font-size: 20px; line-height: 1.4; color: var(--ink); }

<script>
// ——— TWEAKS ———
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "midnight",
  "paper": "cream",
  "principal": "6"
}/*EDITMODE-END*/;

let tweakState = { ...TWEAK_DEFAULTS };

function applyTweaks(s) {
  document.body.classList.remove('accent-oxblood','accent-midnight','accent-forest','accent-graphite');
  document.body.classList.add('accent-' + s.accent);
  document.body.classList.remove('paper-cream','paper-bone','paper-slate');
  document.body.classList.add('paper-' + s.paper);

  // principal number swap
  const map = {
    "14": { big: '14', unit: 'trillion', sub: 'payable to the descendants of the enslaved, as trustee of the unpaid estate.' },
    "20": { big: '20', unit: 'trillion', sub: 'including compounded losses under the Black Codes, Jim Crow, and redlining.' },
    "6":  { big: '6',  unit: 'trillion', sub: 'a conservative floor derived from 246 years of enslaved labor alone.' }
  };
  const m = map[s.principal] || map["14"];
  const big = document.querySelector('.number-big');
  if (big) big.innerHTML = '<span class="sign">$</span>' + m.big + '<span class="unit"> ' + m.unit + '</span>';
  const sub = document.querySelector('.number-sub');
  if (sub) sub.textContent = m.sub;

  // summary row
  const srows = document.querySelectorAll('.summary-row');
  if (srows.length >= 4) {
    const a = srows[3].querySelector('.a');
    if (a) a.innerHTML = '<strong>$' + m.big + ' trillion,</strong> held in a sovereign trust; paid in perpetual yield.';
  }

  // active buttons
  document.querySelectorAll('.tweaks .tw-opts').forEach(group => {
    const key = group.dataset.group;
    group.querySelectorAll('button').forEach(b => {
      b.classList.toggle('active', b.dataset.val === s[key]);
    });
  });
}

function bindTweaks() {
  document.querySelectorAll('.tweaks .tw-opts').forEach(group => {
    const key = group.dataset.group;
    group.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        tweakState[key] = btn.dataset.val;
        applyTweaks(tweakState);
        try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: btn.dataset.val } }, '*'); } catch(e){}
      });
    });
  });
}

window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.type === '__activate_edit_mode') document.getElementById('tweaks').classList.add('on');
  if (d.type === '__deactivate_edit_mode') document.getElementById('tweaks').classList.remove('on');
});

// init
applyTweaks(tweakState);
bindTweaks();
try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch(e){}

</script>

// ——— REVEAL ON SCROLL + TOPBAR MODE ———
const io = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('in');
      io.unobserve(e.target);
    }
  });
}, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });

document.querySelectorAll('.reveal').forEach(el => io.observe(el));

// topbar light/dark based on section
const topbar = document.getElementById('topbar');
const darkSections = document.querySelectorAll('.cover, .dark, .bureau, .closing, .q4');
const tio = new IntersectionObserver((entries) => {
  let anyDark = false;
  entries.forEach(e => {
    if (e.isIntersecting && e.intersectionRatio > 0.25) anyDark = true;
  });
  // fallback: determine by current topmost section
  let topSection = null;
  document.querySelectorAll('section').forEach(s => {
    const r = s.getBoundingClientRect();
    if (r.top <= 80 && r.bottom > 80) topSection = s;
  });
  const isDark = topSection && (topSection.classList.contains('cover') ||
                                topSection.classList.contains('dark') ||
                                topSection.classList.contains('bureau') ||
                                topSection.classList.contains('closing') ||
                                topSection.classList.contains('q4'));
  topbar.classList.toggle('light', !isDark);
}, { threshold: [0, 0.25, 0.5] });

window.addEventListener('scroll', () => {
  let topSection = null;
  document.querySelectorAll('section').forEach(s => {
    const r = s.getBoundingClientRect();
    if (r.top <= 80 && r.bottom > 80) topSection = s;
  });
  const isDark = topSection && (topSection.classList.contains('cover') ||
                                topSection.classList.contains('dark') ||
                                topSection.classList.contains('bureau') ||
                                topSection.classList.contains('closing') ||
                                topSection.classList.contains('q4'));
  topbar.classList.toggle('light', !isDark);
}, { passive: true });

</script>
