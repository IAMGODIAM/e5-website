[build]
  command = "npm run build"
  publish = "_site"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

# Redirect /api/* → Netlify Functions (zero frontend code changes needed)

# ── Subdomain routing ──────────────────────────────────────────────
# gospel.e5enclave.com serves the Gospel of Love subsite
[[redirects]]
  from = "https://gospel.e5enclave.com/"
  to = "/gospel/"
  status = 200
  force = true

[[redirects]]
  from = "https://gospel.e5enclave.com/*"
  to = "/gospel/:splat"
  status = 200
  force = true


[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/api/create-checkout"
  to = "/.netlify/functions/create-checkout"
  status = 200

[[redirects]]
  from = "/api/newsletter"
  to = "/.netlify/functions/newsletter"
  status = 200

[[redirects]]
  from = "/api/printful-webhook"
  to = "/.netlify/functions/printful-webhook"
  status = 200

[[redirects]]
  from = "/api/shipping-rates"
  to = "/.netlify/functions/shipping-rates"
  status = 200

[[redirects]]
  from = "/api/snipcart-webhook"
  to = "/.netlify/functions/snipcart-webhook"
  status = 200



[[redirects]]
  from = "/api/stripe-webhook"
  to = "/.netlify/functions/stripe-webhook"
  status = 200

[[redirects]]
  from = "/api/create-payment-intent"
  to = "/.netlify/functions/create-payment-intent"
  status = 200

[[redirects]]
  from = "/api/confirm-subscription"
  to = "/.netlify/functions/confirm-subscription"
  status = 200

# SPA-style fallback for all unmatched routes

